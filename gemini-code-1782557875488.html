<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>H7benchmark</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #ffffff; font-family: monospace; color: #111; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px; border: 1px solid #ccc; pointer-events: none; z-index: 10; box-shadow: 0 4px 30px rgba(0,0,0,0.15); width: 310px; }
        h1 { margin: 0 0 10px 0; font-size: 1.3rem; color: #ff0055; text-shadow: 0 0 5px rgba(255,0,85,0.2); letter-spacing: 1px; }
        .stat-box { display: flex; gap: 20px; margin: 10px 0; }
        .stat { font-size: 1.8rem; font-weight: bold; }
        
        #rating-box { margin: 12px 0 5px 0; padding: 10px; background: #f0f0f5; border-radius: 8px; border-left: 5px solid #ff0055; }
        #rating-title { font-size: 0.8rem; color: #666; font-weight: bold; }
        #rating-txt { font-size: 1.1rem; font-weight: bold; color: #ff0055; margin-top: 2px; }

        #credit { font-size: 0.85rem; color: #777; margin-top: 12px; border-top: 1px dashed #ccc; padding-top: 8px; text-align: right; }
        #log { margin-top: 12px; color: #d32f2f; font-size: 0.95rem; font-weight: bold; line-height: 1.4; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>H7benchmark</h1>
        <div class="stat-box">
            <div>FPS<br><span id="fps" class="stat" style="color:#ff0055;">--</span></div>
            <div>OBJECTS<br><span id="objects" class="stat">0</span></div>
        </div>
        
        <div id="rating-box">
            <div id="rating-title">💻 現在のPC快適度クラス</div>
            <div id="rating-txt">起動中...</div>
        </div>

        <div id="credit">🔗 h7yt.pages.dev</div>

        <div id="log">⌛ エンジン初期化中...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            START_COUNT: 15,       
            GROWTH_RATE: 0.08,     
            BASE_ADD: 15,
            SHADOW_MAP_SIZE: 4096, 
            AREA_SIZE: 130,
        };

        const ui = {
            fps: document.getElementById('fps'),
            objects: document.getElementById('objects'),
            ratingTxt: document.getElementById('rating-txt'),
            log: document.getElementById('log')
        };

        // 🎰 4K・リアルタイム反射環境に最適化した13段階レーティング
        const RATING_STAGES = [
            { limit: 5,    text: "💥 動作しない", color: "#424242" },
            { limit: 50,   text: "🚨 超最悪スペック", color: "#8b0000" },
            { limit: 150,  text: "🪙 1000円PC？", color: "#b71c1c" },
            { limit: 350,  text: "🐌 重たい", color: "#c62828" },
            { limit: 700,  text: "📺 youtube動画くらいなら見れる", color: "#e65100" },
            { limit: 1200, text: "🎮 ちょっとしたゲームなら遊べる", color: "#f57c00" },
            { limit: 1800, text: "🟢 普通", color: "#4caf50" },
            { limit: 2500, text: "⛏️ マイクラ若干動くか？", color: "#2e7d32" },
            { limit: 3800, text: "🐉 モンハン動く", color: "#00c853" }, 
            { limit: 4600, text: "✨ サクサク", color: "#00b0ff" },
            { limit: 5400, text: "⚡ レベチ", color: "#2979ff" }, 
            { limit: 6500, text: "🌌 未来からの贈り物？", color: "#aa00ff" },
            { limit: Infinity, text: "👑 神の領域", color: "#ff007f" }
        ];

        function updateRating(count) {
            for (const stage of RATING_STAGES) {
                if (count <= stage.limit) {
                    ui.ratingTxt.textContent = stage.text;
                    ui.ratingTxt.style.color = stage.color;
                    document.getElementById('rating-box').style.borderLeftColor = stage.color;
                    break;
                }
            }
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.FogExp2(0xffffff, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 45, 85);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3; 
        document.body.appendChild(renderer.domElement);

        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.VSMShadowMap; 

        const ambientLight = new THREE.AmbientLight(0xe5e5e5);
        scene.add(ambientLight);

        const light1 = new THREE.SpotLight(0xffffff, 14000, 0, Math.PI / 4, 0.6);
        light1.position.set(20, 120, 20);
        light1.castShadow = true;
        light1.shadow.mapSize.width = CONFIG.SHADOW_MAP_SIZE;
        light1.shadow.mapSize.height = CONFIG.SHADOW_MAP_SIZE;
        light1.shadow.camera.near = 40;
        light1.shadow.camera.far = 200;
        light1.shadow.bias = -0.0005;
        light1.shadow.blurSamples = 4; 
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0xffffff, 2);
        light2.position.set(-60, 70, -30);
        light2.castShadow = true;
        light2.shadow.mapSize.width = CONFIG.SHADOW_MAP_SIZE;
        light2.shadow.mapSize.height = CONFIG.SHADOW_MAP_SIZE;
        scene.add(light2);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(900, 900),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.08, metalness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -20;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(900, 45, 0xcccccc, 0xeeeeee);
        grid.position.y = -19.9;
        scene.add(grid);

        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, { 
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter
        });
        const cubeCamera = new THREE.CubeCamera(1, 500, cubeRenderTarget);
        scene.add(cubeCamera);

        const meshes = [];
        const initialStates = [];
        let mirrorBall = null;

        function createHeavyTexture() {
            const size = 64; 
            const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const v = Math.random() * 255;
                imgData.data[i] = v; imgData.data[i+1] = v; imgData.data[i+2] = v; imgData.data[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
            return new THREE.CanvasTexture(canvas);
        }

        function createMirrorCore() {
            const geometry = new THREE.SphereGeometry(10, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: 0xffffff, metalness: 1.0, roughness: 0.0,
                envMap: cubeRenderTarget.texture
            });
            mirrorBall = new THREE.Mesh(geometry, material);
            mirrorBall.position.set(0, -5, 0);
            mirrorBall.castShadow = true;
            mirrorBall.receiveShadow = true;
            scene.add(mirrorBall);
        }
        createMirrorCore();

        function addObjects(count) {
            for (let i = 0; i < count; i++) {
                const geometry = new THREE.IcosahedronGeometry(2, 2);
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(`hsl(${Math.random() * 360}, 95%, 55%)`),
                    metalness: 0.90, roughness: 0.05,
                    emissive: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 20%)`),
                    bumpMap: createHeavyTexture(), bumpScale: 0.03
                });

                const mesh = new THREE.Mesh(geometry, material);
                let x = (Math.random() - 0.5) * CONFIG.AREA_SIZE;
                let y = Math.random() * 35 - 5; 
                let z = (Math.random() - 0.5) * CONFIG.AREA_SIZE;
                
                if(Math.abs(x) < 15 && Math.abs(z) < 15) { x += 25; z += 25; }

                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                scene.add(mesh);
                meshes.push(mesh);

                initialStates.push({
                    x: x, y: y, z: z,
                    speed: 0.5 + Math.random() * 1.3,
                    phase: Math.random() * Math.PI * 2 
                });
            }
            ui.objects.textContent = meshes.length;
            updateRating(meshes.length); 
        }

        let lastTime = performance.now();
        let lastIncrementTime = performance.now();
        let frameCount = 0;
        let time = 0;
        let isFinished = false;
        let isWarmUp = true;

        function animate() {
            if (isFinished) return;
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            time += delta;

            if (time > 1.2) {
                if (isWarmUp) {
                    isWarmUp = false;
                    addObjects(CONFIG.START_COUNT);
                    lastIncrementTime = now;
                }
                
                if (now - lastIncrementTime >= 1000) {
                    const toAdd = Math.floor(meshes.length * CONFIG.GROWTH_RATE) + CONFIG.BASE_ADD;
                    addObjects(toAdd);
                    lastIncrementTime = now;
                    ui.log.textContent = "📈 負荷増大中...";
                }
            }

            for (let i = 0; i < meshes.length; i++) {
                const mesh = meshes[i];
                const state = initialStates[i];
                mesh.position.y = state.y + Math.sin(time * state.speed + state.phase) * 18;
                mesh.position.x = state.x + Math.sin(time * 0.2 * state.speed + state.phase) * 6;
                mesh.position.z = state.z + Math.cos(time * 0.2 * state.speed + state.phase) * 6;
                mesh.rotation.x += 0.01; mesh.rotation.y += 0.015;
            }

            if(mirrorBall) {
                mirrorBall.position.y = -5 + Math.sin(time * 0.4) * 4;
                mirrorBall.rotation.y -= 0.003;
            }

            camera.position.x = 105 * Math.sin(time * 0.03);
            camera.position.z = 105 * Math.cos(time * 0.03);
            camera.lookAt(0, 0, 0);

            if (mirrorBall && meshes.length > 0) {
                mirrorBall.visible = false;
                cubeCamera.position.copy(mirrorBall.position);
                cubeCamera.update(renderer, scene); 
                mirrorBall.visible = true;
            }

            renderer.render(scene, camera);

            frameCount++;
            if (now - lastTime >= 500) {
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                ui.fps.textContent = fps ? fps : "--";
                ui.fps.style.color = fps >= 45 ? '#ff0055' : fps >= 15 ? '#ffa000' : '#d32f2f';

                if (fps > 0 && fps < 5 && time > 4) {
                    isFinished = true;
                    let finalRating = "判定不能";
                    for (const stage of RATING_STAGES) {
                        if (meshes.length <= stage.limit) {
                            finalRating = stage.text;
                            break;
                        }
                    }
                    ui.log.innerHTML = `🛑 BENCHMARK STOPPED<br><br>【最終スコア】<br>オブジェクト数: <span style="color:#ff0055; font-size:1.4rem;">${meshes.length}</span><br>PC快適度: <br><span style="font-size:1.1rem; color:#0076ff;">${finalRating}</span>`;
                    return;
                }

                frameCount = 0;
                lastTime = now;
            }
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

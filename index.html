
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>H7benchmark - Infinite Reflection Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #5599ee; font-family: monospace; color: #fff; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(5, 10, 25, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #00ffcc; pointer-events: none; z-index: 10; box-shadow: 0 4px 30px rgba(0,255,204,0.2); width: 310px; backdrop-filter: blur(8px); }
        h1 { margin: 0 0 5px 0; font-size: 1.3rem; color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,204,0.6); letter-spacing: 1px; }
        .sub-title { font-size: 0.75rem; color: #88ccff; margin-bottom: 10px; }
        .stat-box { display: flex; gap: 20px; margin: 10px 0; }
        .stat { font-size: 1.8rem; font-weight: bold; }
        
        #rating-box { margin: 12px 0 5px 0; padding: 10px; background: rgba(255,255,255,0.06); border-radius: 8px; border-left: 5px solid #00ffcc; }
        #rating-title { font-size: 0.8rem; color: #b0c0d0; font-weight: bold; }
        #rating-txt { font-size: 1.1rem; font-weight: bold; color: #00ffcc; margin-top: 2px; }

        #credit { font-size: 0.85rem; color: #6688aa; margin-top: 12px; border-top: 1px dashed #334455; padding-top: 8px; text-align: right; }
        #log { margin-top: 12px; color: #ff3366; font-size: 0.95rem; font-weight: bold; line-height: 1.4; border-top: 1px solid #223344; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>H7benchmark</h1>
        <div class="sub-title">All-Block Infinite Reflection</div>
        <div class="stat-box">
            <div>FPS<br><span id="fps" class="stat" style="color:#00ffcc;">--</span></div>
            <div>BLOCKS<br><span id="objects" class="stat">0</span></div>
        </div>
        
        <div id="rating-box">
            <div id="rating-title">💻 現在のPC快適度クラス</div>
            <div id="rating-txt">鏡面世界を構築中...</div>
        </div>

        <div id="credit">🔗 h7yt.pages.dev</div>

        <div id="log">⌛ チャンク読み込み中...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            SHADOW_MAP_SIZE: 4096, 
            BLOCK_ADD_SPEED: 130, // さらに高速にブロックを流し込んで即死を狙う
        };

        const ui = {
            fps: document.getElementById('fps'),
            objects: document.getElementById('objects'),
            ratingTxt: document.getElementById('rating-txt'),
            log: document.getElementById('log')
        };

        const RATING_STAGES = [
            { limit: 50,   text: "💥 起動不能レベル", color: "#424242" },
            { limit: 300,  text: "🚨 超最悪スペック", color: "#8b0000" },
            { limit: 1000, text: "🪙 1000円PC？", color: "#b71c1c" },
            { limit: 2500, text: "🐌 重たい", color: "#c62828" },
            { limit: 5000, text: "📺 youtube動画くらいなら見れる", color: "#e65100" },
            { limit: 8000, text: "🎮 ちょっとしたゲームなら遊べる", color: "#f57c00" },
            { limit: 12000,text: "🟢 普通", color: "#4caf50" },
            { limit: 16000,text: "⛏️ マイクラ若干動くか？", color: "#2e7d32" },
            { limit: 20000,text: "🐉 モンハン動く", color: "#00c853" }, 
            { limit: 25000,text: "✨ サクサク", color: "#00b0ff" },
            { limit: 32000,text: "⚡ レベチ", color: "#2979ff" }, 
            { limit: 40000,text: "🌌 未来からの贈り物？", color: "#aa00ff" },
            { limit: Infinity, text: "👑 神の領域", color: "#ff007f" }
        ];

        function updateRating(count) {
            for (const stage of RATING_STAGES) {
                if (count <= stage.limit) {
                    ui.ratingTxt.textContent = stage.text;
                    ui.ratingTxt.style.color = stage.color;
                    document.getElementById('rating-box').style.borderLeftColor = stage.color;
                    break;
                }
            }
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5599ee); 
        scene.fog = new THREE.FogExp2(0x5599ee, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 1000);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2; 
        document.body.appendChild(renderer.domElement);

        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.VSMShadowMap; 

        const ambientLight = new THREE.AmbientLight(0xaabbff, 1.5);
        scene.add(ambientLight);

        // 太陽光
        const sunLight = new THREE.DirectionalLight(0xfff8f0, 4.5);
        sunLight.position.set(-70, 110, -60);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = CONFIG.SHADOW_MAP_SIZE;
        sunLight.shadow.mapSize.height = CONFIG.SHADOW_MAP_SIZE;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 400;
        const d = 160;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.bias = -0.0002;
        scene.add(sunLight);

        // 太陽の球体
        const sunOrbit = new THREE.Group();
        const sunGeometry = new THREE.SphereGeometry(14, 16, 16);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        sunMesh.position.copy(sunLight.position).normalize().multiplyScalar(280);
        sunOrbit.add(sunMesh);
        scene.add(sunOrbit);

        // 🌊 波打つ水面用のテクスチャ
        function createWaveTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            for(let x=0; x<128; x++) {
                for(let y=0; y<128; y++) {
                    const nx = Math.sin(x*0.1) * 127 + 128;
                    const ny = Math.cos(y*0.1) * 127 + 128;
                    ctx.fillStyle = `rgb(${nx}, ${ny}, 255)`; ctx.fillRect(x, y, 1, 1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(20, 20);
            return tex;
        }
        const waveNormalMap = createWaveTexture();

        // 🪞 【心臓部】すべてのオブジェクトが反射を読み込むための環境マップカメラ（512px高解像度）
        const globalRenderTarget = new THREE.WebGLCubeRenderTarget(512, { 
            generateMipmaps: true, 
            minFilter: THREE.LinearMipmapLinearFilter 
        });
        const globalCubeCamera = new THREE.CubeCamera(0.1, 1000, globalRenderTarget);
        scene.add(globalCubeCamera);

        // 水面マテリアル
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x1a657a, roughness: 0.1, metalness: 0.9,
            normalMap: waveNormalMap, normalScale: new THREE.Vector2(0.2, 0.2),
            envMap: globalRenderTarget.texture, transparent: true, opacity: 0.8
        });
        const waterGeo = new THREE.PlaneGeometry(2000, 2000);
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = -2;
        water.receiveShadow = true;
        scene.add(water);

        // 🪞 全ブロック共通マテリアル（すべてに鏡面反射 envMap を強制付与！）
        const materials = {
            grass: new THREE.MeshStandardMaterial({ color: 0x559622, roughness: 0.2, metalness: 0.6, envMap: globalRenderTarget.texture }),
            dirt: new THREE.MeshStandardMaterial({ color: 0x66442b, roughness: 0.4, metalness: 0.5, envMap: globalRenderTarget.texture }),
            stone: new THREE.MeshStandardMaterial({ color: 0x737373, roughness: 0.1, metalness: 0.8, envMap: globalRenderTarget.texture }),
            wood: new THREE.MeshStandardMaterial({ color: 0x8c532b, roughness: 0.25, metalness: 0.6, envMap: globalRenderTarget.texture }),
            leaf: new THREE.MeshStandardMaterial({ color: 0x226611, roughness: 0.15, metalness: 0.7, envMap: globalRenderTarget.texture }),
        };

        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const blockPositions = [];
        let totalBlocks = 0;

        function getTerrainHeight(x, z) {
            return Math.floor((Math.sin(x * 0.04) * Math.cos(z * 0.04) * 8) + (Math.sin(x * 0.08) * 2));
        }

        const range = 80;
        for (let x = -range; x < range; x++) {
            for (let z = -range; z < range; z++) {
                const height = getTerrainHeight(x, z);
                blockPositions.push({ x, y: height, z, type: height > 3 ? 'stone' : 'grass' });
                blockPositions.push({ x, y: height - 1, z, type: 'dirt' });
                
                if (Math.random() < 0.007 && height > -1) {
                    for(let h=1; h<=5; h++) blockPositions.push({ x, y: height + h, z, type: 'wood' }); 
                    for(let lx=-2; lx<=2; lx++) {
                        for(let lz=-2; lz<=2; lz++) {
                            if (Math.abs(lx) + Math.abs(lz) < 4) {
                                blockPositions.push({ x: x+lx, y: height + 5, z: z+lz, type: 'leaf' });
                            }
                        }
                    }
                }
            }
        }
        blockPositions.sort(() => Math.random() - 0.5);

        const activeMeshes = [];

        function generateBlocks(count) {
            const limit = Math.min(blockPositions.length, totalBlocks + count);
            for (let i = totalBlocks; i < limit; i++) {
                const b = blockPositions[i];
                const mesh = new THREE.Mesh(boxGeo, materials[b.type]);
                mesh.position.set(b.x, b.y, b.z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                activeMeshes.push(mesh);
            }
            totalBlocks = activeMeshes.length;
            ui.objects.textContent = totalBlocks;
            updateRating(totalBlocks);
        }

        let lastTime = performance.now();
        let frameCount = 0;
        let time = 0;
        let isFinished = false;

        function animate() {
            if (isFinished) return;
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            time += delta;

            if (!isFinished && totalBlocks < blockPositions.length) {
                generateBlocks(CONFIG.BLOCK_ADD_SPEED);
                ui.log.textContent = "💎 全ブロックの鏡面反射を動的計算中...";
            }

            if(waveNormalMap) {
                waveNormalMap.offset.x = time * 0.02;
                waveNormalMap.offset.y = time * 0.025;
            }

            // カメラワーク
            const radius = 60 + Math.sin(time * 0.05) * 8;
            camera.position.x = radius * Math.sin(time * 0.06);
            camera.position.z = radius * Math.cos(time * 0.06);
            camera.position.y = 8 + Math.sin(time * 0.15) * 4;
            camera.lookAt(0, 0, 0);

            // 🪞 すべてのブロックに反射を適用するため、カメラ位置を連動させて環境マップを更新
            if (totalBlocks > 0) {
                // 水面と全ブロックのメッシュを一時的に隠さずに、そのまま全空間を多重書き込み
                globalCubeCamera.position.copy(camera.position);
                globalCubeCamera.update(renderer, scene);
            }

            renderer.render(scene, camera);

            frameCount++;
            if (now - lastTime >= 500) {
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                ui.fps.textContent = fps ? fps : "--";
                ui.fps.style.color = fps >= 45 ? '#00ffcc' : fps >= 15 ? '#ffa000' : '#ff5555';

                if (fps > 0 && fps < 5 && time > 3) {
                    isFinished = true;
                    let finalRating = "判定不能";
                    for (const stage of RATING_STAGES) {
                        if (totalBlocks <= stage.limit) {
                            finalRating = stage.text;
                            break;
                        }
                    }
                    ui.log.innerHTML = `🛑 BENCHMARK STOPPED<br><br>【最終スコア】<br>無限反射ブロック数: <span style="color:#00ffcc; font-size:1.4rem;">${totalBlocks}</span><br>PC快適度: <br><span style="font-size:1.1rem; color:#00b0ff;">${finalRating}</span>`;
                    return;
                }

                frameCount = 0;
                lastTime = now;
            }
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
